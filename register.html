<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun | EverythingsByFour</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">EverythingsByFour.</div>
      <div class="nav-links">
        <a href="index.html">⬅️ Kembali ke Toko</a>
      </div>
    </nav>

    <div class="auth-wrapper">
      <div class="auth-card">
        <h1>Buat Akun Baru ✨</h1>
        <p class="auth-sub">Daftar untuk memudahkan pelacakan pesanan & checkout kamu.</p>

        <p id="register-error" class="auth-error"></p>

        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="auth-form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="reg-name" required placeholder="Nama kamu" />
          </div>
          <div class="auth-form-group">
            <label>Email</label>
            <input type="email" id="reg-email" required placeholder="nama@email.com" />
          </div>
          <div class="auth-form-group">
            <label>Nomor WhatsApp</label>
            <input type="tel" id="reg-phone" required placeholder="081234567XXX" />
          </div>
          <div class="auth-form-group">
            <label>Kata Sandi</label>
            <input type="password" id="reg-password" required minlength="6" placeholder="Minimal 6 karakter" />
          </div>
          <div class="auth-form-group">
            <label>Ulangi Kata Sandi</label>
            <input type="password" id="reg-password-confirm" required minlength="6" placeholder="Ketik ulang kata sandi" />
          </div>
          <button type="submit" class="auth-submit-btn">Daftar Sekarang</button>
        </form>

        <span class="auth-switch-link">
          Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </span>
      </div>
    </div>

    <script src="js/default_products.js"></script>
    <script src="js/store.js"></script>
    <script>
      // Kalau sudah login, tidak perlu daftar lagi
      if (EB4Store.getCurrentUser()) {
        window.location.href = "profile.html";
      }

      function handleRegister(e) {
        e.preventDefault();
        const errorBox = document.getElementById("register-error");
        errorBox.style.display = "none";

        const name = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const phone = document.getElementById("reg-phone").value.trim();
        const password = document.getElementById("reg-password").value;
        const passwordConfirm = document.getElementById("reg-password-confirm").value;

        if (password !== passwordConfirm) {
          errorBox.textContent = "Kata sandi dan ulangi kata sandi tidak sama.";
          errorBox.style.display = "block";
          return;
        }

        const result = EB4Store.registerUser({ name, email, phone, password });
        if (!result.ok) {
          errorBox.textContent = result.message;
          errorBox.style.display = "block";
          return;
        }

        window.location.href = "profile.html";
      }
    </script>
  </body>
</html>
