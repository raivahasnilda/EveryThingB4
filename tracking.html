<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lacak Pesanan | EverythingsByFour</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">EverythingsByFour.</div>
      <div class="nav-links">
        <a href="index.html">🛍️ Belanja</a>
        <span id="nav-auth-area"></span>
      </div>
    </nav>

    <div class="tracking-page">
      <h2 class="section-title">Lacak Pesanan Kamu</h2>

      <div class="tracking-search-box">
        <input
          type="text"
          id="tracking-input"
          placeholder="Masukkan Nomor Pesanan, contoh: EB4-ORD123456"
          onkeydown="if(event.key==='Enter') cariPesanan();"
        />
        <button class="btn-hero" style="background:#db7a91; color:white;" onclick="cariPesanan()">🔍 Lacak</button>
      </div>

      <div id="tracking-result"></div>

      <div id="tracking-my-orders" style="margin-top:35px;"></div>
    </div>

    <script src="js/default_products.js"></script>
    <script src="js/store.js"></script>
    <script src="js/authnav.js"></script>
    <script src="js/chatwidget.js"></script>
    <script>
      const STATUS_FLOW = ["Baru", "Diproses", "Dikirim", "Selesai"];
      const STATUS_ICON = { Baru: "🆕", Diproses: "⚙️", Dikirim: "🚚", Selesai: "✅", Dibatalkan: "❌" };

      function renderTimeline(order) {
        if (order.status === "Dibatalkan") {
          return `
            <div class="tracking-timeline">
              <div class="tracking-step done">
                <div class="tracking-dot">❌</div>
                <div>
                  <div class="tracking-step-title">Pesanan Dibatalkan</div>
                  <div class="tracking-step-time">${EB4Store.formatDateTime(order.createdAt)}</div>
                </div>
              </div>
            </div>`;
        }

        const historyMap = {};
        (order.statusHistory || []).forEach((h) => {
          if (!historyMap[h.status]) historyMap[h.status] = h.time;
        });

        const currentIdx = STATUS_FLOW.indexOf(order.status);

        return `
          <div class="tracking-timeline">
            ${STATUS_FLOW.map((status, idx) => {
              const done = idx <= currentIdx;
              const time = historyMap[status];
              return `
              <div class="tracking-step ${done ? "done" : ""}">
                <div class="tracking-dot">${STATUS_ICON[status]}</div>
                <div>
                  <div class="tracking-step-title">${status}</div>
                  <div class="tracking-step-time">${time ? EB4Store.formatDateTime(time) : "Menunggu"}</div>
                </div>
              </div>`;
            }).join("")}
          </div>`;
      }

      function tampilkanPesanan(order) {
        const box = document.getElementById("tracking-result");
        if (!order) {
          box.innerHTML = `<div style="text-align:center; padding:50px 20px; color:#8a8a8a; background:white; border:1px solid var(--border-color); border-radius:20px; font-size:14px;">Nomor pesanan tidak ditemukan. Pastikan nomor yang kamu masukkan sudah benar (lihat di halaman konfirmasi checkout).</div>`;
          return;
        }

        box.innerHTML = `
          <div class="tracking-search-box" style="display:block;">
            <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:6px;">
              <strong style="color:#4A4A4A;">Pesanan #${order.id}</strong>
              <span style="color:#db7a91; font-weight:800;">${EB4Store.formatRupiah(order.totalHarga)}</span>
            </div>
            <div style="font-size:13px; color:#8A8A8A;">Dipesan pada ${EB4Store.formatDateTime(order.createdAt)}</div>
          </div>
          ${renderTimeline(order)}
        `;
      }

      function cariPesanan() {
        const id = document.getElementById("tracking-input").value.trim();
        if (!id) return;
        tampilkanPesanan(EB4Store.getOrderById(id));
      }

      function renderPesananSaya() {
        const user = EB4Store.getCurrentUser();
        const box = document.getElementById("tracking-my-orders");
        if (!user) {
          box.innerHTML = "";
          return;
        }
        const orders = EB4Store.getOrdersByUser(user.id);
        if (orders.length === 0) {
          box.innerHTML = "";
          return;
        }
        box.innerHTML = `
          <h3 style="color:#4A4A4A; margin-bottom:15px;">Pesanan Akun Kamu</h3>
          ${orders
            .map(
              (o) => `
            <div class="profile-order-item">
              <div>
                <div style="font-weight:700; color:#4A4A4A;">#${o.id}</div>
                <div style="font-size:12px; color:#8A8A8A;">${EB4Store.formatDateTime(o.createdAt)}</div>
              </div>
              <div style="display:flex; align-items:center; gap:10px;">
                <span class="profile-order-status-pill">${STATUS_ICON[o.status] || ""} ${o.status}</span>
                <button onclick="document.getElementById('tracking-input').value='${o.id}'; cariPesanan(); window.scrollTo({top:0, behavior:'smooth'});" style="background:var(--pastel-blue); color:#4a6b82; border:none; font-weight:700; font-size:12px; padding:8px 14px; border-radius:12px; cursor:pointer;">Lihat →</button>
              </div>
            </div>`,
            )
            .join("")}
        `;
      }

      // Kalau datang dari link checkout (?id=EB4-ORDxxxxx), langsung tampilkan
      const params = new URLSearchParams(window.location.search);
      const idFromUrl = params.get("id");
      if (idFromUrl) {
        document.getElementById("tracking-input").value = idFromUrl;
        tampilkanPesanan(EB4Store.getOrderById(idFromUrl));
      }

      renderPesananSaya();
    </script>
  </body>
</html>
